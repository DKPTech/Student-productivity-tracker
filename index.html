<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Productivity Tracker</title>
<style>
body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:90%;
max-width:1400px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#333;
}

.task-form{
display:flex;
gap:10px;
flex-direction: column;
margin-bottom:20px;
}

.task-form input{
padding:5px;
flex:1;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
width:100%;
overflow-x:auto;
display:block;
}

th, td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f0f0f0;
}

.delete{
color:red;
text-decoration:none;
}

@media (max-width:300px){

.container{
width:90%;
margin-top:10px;
padding:15px;
}

.task-form{
flex-direction:column;
}

h1{
font-size:22px;
}

th, td{
font-size:13px;
padding:10px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>📚 Study Productivity Tracker</h1>

<form action="/add" method="POST" class="task-form">
<input type="text" name="title" placeholder="Task name" required>
<input type="number" step="0.1" name="hours" placeholder="Hours studied" required>
<button type="submit">Add Task</button>
</form>

<h2>Your Study Log</h2>

<table>
<tr>
<th>Task</th>
<th>Hours</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for task in tasks %}
<tr>
<td>{{ task[1] }}</td>
<td>{{ task[2] }}</td>
<td>{{ task[3] }}</td>
<td>
<a href="/delete/{{task[0]}}" class="delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
